schema_version: "1.0.0"
product: "thriller-forge-for-pi"

series_planning:
  label: "Phase 1: Series Planning"
  prompt: "references/prompts/series-start.md"
  gate: "series_planning"
  outputs:
    - "SERIES_STATE.yaml"
    - "STATUS.md"
    - "series/series-bible.md"
    - "series/series-arc.md"
    - "series/cast-and-pressure-map.md"
    - "series/reveal-ledger.md"
    - "series/continuity-ledger.md"
    - "series/market-package.md"
  next: "Phase 2: Book Architecture"

book_architecture:
  label: "Phase 2: Book Architecture"
  prompt: "references/prompts/book-plan.md"
  gate: "book_architecture"
  outputs:
    - "books/book-NN/BOOK_STATE.yaml"
    - "books/book-NN/book-bible.md"
    - "books/book-NN/plot-ladder.md"
    - "books/book-NN/threat-clock.md"
  next: "Phase 3: Chapter Queue"

chapter_queue:
  label: "Phase 3: Chapter Queue"
  prompt: "references/prompts/architecture.md"
  gate: "chapter_queue"
  outputs:
    - "books/book-NN/chapter-queue.md"
  next: "Phase 4: Drafting"

drafting:
  label: "Phase 4: Drafting"
  prompt: "references/prompts/drafting.md"
  gate: "drafting"
  outputs:
    - "books/book-NN/manuscript/chapters/"
    - "series/reveal-ledger.md"
    - "series/continuity-ledger.md"
    - "books/book-NN/chapter-queue.md"
    - "books/book-NN/revision-tickets.md"
  next: "Phase 5: Act Audit"

act_audit:
  label: "Phase 5: Act Audit"
  prompt: "references/prompts/adversarial-audit.md"
  gate: "act_audit"
  outputs:
    - "books/book-NN/audits/act-1-audit.md"
    - "books/book-NN/audits/midpoint-audit.md"
    - "books/book-NN/audits/final-act-audit.md"
    - "books/book-NN/revision-tickets.md"
  next: "Phase 6: Manuscript Audit"

manuscript_audit:
  label: "Phase 6: Manuscript Audit"
  prompt: "references/prompts/adversarial-audit.md"
  gate: "manuscript_audit"
  outputs:
    - "books/book-NN/audits/manuscript-audit.md"
    - "books/book-NN/audits/style-audit.md"
    - "books/book-NN/revision-tickets.md"
  next: "Phase 7: Series Audit"

series_audit:
  label: "Phase 7: Series Audit"
  prompt: "references/prompts/adversarial-audit.md"
  gate: "series_audit"
  outputs:
    - "series/series-bible.md"
    - "series/series-arc.md"
    - "series/reveal-ledger.md"
    - "series/continuity-ledger.md"
    - "books/book-NN/revision-tickets.md"
  next: "Phase 8: Packaging"

packaging:
  label: "Phase 8: Packaging"
  prompt: "references/prompts/editorial-package.md"
  gate: "packaging"
  outputs:
    - "series/market-package.md"
    - "books/book-NN/package.md"
  next: ""
