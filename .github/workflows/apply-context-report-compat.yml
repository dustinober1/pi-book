name: Apply context report compatibility repair

on:
  push:
    branches: [feat/adaptive-context-distillation]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/adaptive-context-distillation
          fetch-depth: 0
      - run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/context/context-builder.ts')
          text = path.read_text()
          text = text.replace('  build: ContextBuildReport;\n  cache: { status: "hit" | "miss" | "write-failed"; key: string };', '  build?: ContextBuildReport;\n  cache?: { status: "hit" | "miss" | "write-failed"; key: string };')
          text = text.replace('ChapterContextReport["cache"]["status"]', '"hit" | "miss" | "write-failed"')
          path.write_text(text)
          PY
          rm .github/workflows/apply-context-report-compat.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: keep context report diagnostics additive"
          git push origin HEAD:feat/adaptive-context-distillation
