name: Sync guided lockfile

on:
  push:
    branches:
      - agent/guided-novel-forge-ux
    paths:
      - .github/workflows/sync-guided-lock.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/guided-novel-forge-ux
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
      - name: Regenerate package lock metadata
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
      - name: Remove one-time helper and commit
        run: |
          rm .github/workflows/sync-guided-lock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json .github/workflows/sync-guided-lock.yml
          if git diff --cached --quiet; then
            echo "No lockfile changes were required."
            exit 0
          fi
          git commit -m "chore: sync 1.1.0 package lock"
          git push origin HEAD:agent/guided-novel-forge-ux
