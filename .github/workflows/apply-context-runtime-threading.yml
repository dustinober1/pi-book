name: Apply explicit context runtime threading

on:
  push:
    branches: [feat/adaptive-context-distillation]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/adaptive-context-distillation
          fetch-depth: 0
      - run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/application/run.ts')
          text = path.read_text()
          old = 'buildChapterContext(root, chapter, runtimeProfile.maxContextChars, runtimeProfile.graphDepth)'
          new = 'buildChapterContext(root, chapter, runtimeProfile.maxContextChars, runtimeProfile.graphDepth, runtimeProfile.id)'
          if old not in text:
              raise SystemExit('expected direct draft context call not found')
          path.write_text(text.replace(old, new))
          PY
          rm .github/workflows/apply-context-runtime-threading.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: pass resolved runtime profile to context builder"
          git push origin HEAD:feat/adaptive-context-distillation
