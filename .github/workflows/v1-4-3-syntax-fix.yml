name: Repair intake integration syntax

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/v1.4-3-intake-decisions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v1.4-3-intake-decisions
          fetch-depth: 0
      - run: |
          python - <<'PY'
          from pathlib import Path

          # Repair the event validation template literal.
          path = Path('src/application/events.ts')
          text = path.read_text(encoding='utf-8')
          old = '''    if (blockers.length) throw new Error(`Intake and decision ledger validation blocked the event:\n${blockers.map((item) => `- ${item.message}`).join("\n")}`);'''
          # The current file contains literal newlines from the earlier generated patch.
          start = text.index('    if (blockers.length) throw new Error(`Intake and decision ledger validation blocked the event:')
          end = text.index('  }\n}', start)
          replacement = '    if (blockers.length) throw new Error(`Intake and decision ledger validation blocked the event:\\n${blockers.map((item) => `- ${item.message}`).join("\\n")}`);\n'
          text = text[:start] + replacement + text[end:]
          path.write_text(text, encoding='utf-8')

          # Repair prompt interpolation and escaped inline code.
          path = Path('src/application/prompts.ts')
          text = path.read_text(encoding='utf-8')
          text = text.replace('Project root: ${root}\\n\\n${interviewRule}\\n\\nFor voice intake', 'Project root: ${root}\\n\\n${intakeContext ? intakeContext + "\\n\\n" : ""}${interviewRule}\\n\\nFor voice intake', 1)
          text = text.replace('Active book: ${book.book_id}\\n\\n${interviewRule}\\n\\nThe four primary', 'Active book: ${book.book_id}\\n\\n${intakeContext ? intakeContext + "\\n\\n" : ""}${interviewRule}\\n\\nThe four primary', 1)
          text = text.replace('Use the state-neutral `intake-update` event for any intake or decision-ledger evidence. Never silently rewrite assumption or decision history.', 'Use the state-neutral \\`intake-update\\` event for any intake or decision-ledger evidence. Never silently rewrite assumption or decision history.')
          # Add the missing voice instruction before the final voice artifact sentence.
          anchor = 'Produce complete required artifacts, not a questionnaire transcript.\\n\\n${eventRule(root, "voice-profile"'
          addition = 'Use the state-neutral \\`intake-update\\` event for any intake or decision-ledger evidence. Never silently rewrite assumption or decision history.\\n\\n'
          if addition + anchor not in text:
              if anchor not in text:
                  raise SystemExit('voice instruction anchor missing')
              text = text.replace(anchor, addition + anchor, 1)
          path.write_text(text, encoding='utf-8')
          PY
          rm -f .github/workflows/v1-4-3-syntax-fix.yml
          touch docs/.v1-4-3-syntax-ready
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: repair intake event and prompt syntax"
          git push origin HEAD:agent/v1.4-3-intake-decisions
