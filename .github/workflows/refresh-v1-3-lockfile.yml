name: Refresh v1.3 package lock

on:
  push:
    branches:
      - agent/v1.3-phase-1-contracts-compatibility
    paths:
      - .github/workflows/refresh-v1-3-lockfile.yml

permissions:
  contents: write

jobs:
  refresh-lockfile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v1.3-phase-1-contracts-compatibility
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Regenerate package lock metadata
        run: npm install --package-lock-only --ignore-scripts
      - name: Commit package lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git diff --cached --quiet || git commit -m "chore: sync v1.3 package lock"
          git push origin HEAD:agent/v1.3-phase-1-contracts-compatibility
