name: Apply prompt integration repair

on:
  push:
    branches: [feat/compact-prompt-compiler]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/compact-prompt-compiler
          fetch-depth: 0
      - run: |
          python - <<'PY'
          from pathlib import Path

          specs_path = Path('src/application/stage-specs/index.ts')
          specs = specs_path.read_text()
          replacements = {
              '"Never label a calibration variant with an author or book.",': '"Never label a variant with an author or book.",',
              '"Never import public-review observations.",': '"This workflow must never import public-review observations.",',
              'toolRules: eventToolRules({ eventType: "draft-chapter", expectedStage: "drafting", projectHash: input.projectHash, extra: `Pass chapter: ${input.chapter}.` }),': '''toolRules: [
                "Never write project files directly; apply one guarded novel_apply_event.",
                `Call novel_apply_event with event_type draft-chapter, expected_stage drafting, expected_project_hash ${input.projectHash}, chapter ${input.chapter}, and only allowed changed files.`,
                "Tool validation of schemas, references, stage, file allowlists, stale state, and the complete commit is authoritative.",
                "Correct and retry once only for schema-validation or reference-validation.",
                "Reload and rebuild for stale-stage or stale-project-hash; stop and surface every other rejection.",
              ],''',
          }
          for old, new in replacements.items():
              if old not in specs:
                  raise SystemExit(f'missing StageSpec replacement target: {old}')
              specs = specs.replace(old, new, 1)
          specs_path.write_text(specs)

          run_path = Path('src/application/run.ts')
          run = run_path.read_text()
          call_replacements = {
              'reviewPrompt(root, "act")': 'reviewPrompt(root, "act", runtimeProfile)',
              'reviewPrompt(root, "manuscript")': 'reviewPrompt(root, "manuscript", runtimeProfile)',
              'voicePlanPrompt(root)': 'voicePlanPrompt(root, runtimeProfile)',
              'seriesPlanPrompt(root)': 'seriesPlanPrompt(root, runtimeProfile)',
              'bookPlanPrompt(root)': 'bookPlanPrompt(root, runtimeProfile)',
              'queuePrompt(root)': 'queuePrompt(root, runtimeProfile)',
              'automationDraftPrompt(root, limits.maxChapters, options.until)': 'automationDraftPrompt(root, limits.maxChapters, options.until, runtimeProfile)',
              'revisionPrompt(root, tickets.slice(0, ticketLimit))': 'revisionPrompt(root, tickets.slice(0, ticketLimit), runtimeProfile)',
              'canonLockPrompt(root)': 'canonLockPrompt(root, runtimeProfile)',
              'packagePrompt(root)': 'packagePrompt(root, runtimeProfile)',
              'premisePlanPrompt(root)': 'premisePlanPrompt(root, runtimeProfile)',
              'draftPrompt(context)': 'draftPrompt(context, runtimeProfile)',
              'revisionPrompt(root, selected)': 'revisionPrompt(root, selected, runtimeProfile)',
          }
          for old, new in call_replacements.items():
              if old not in run:
                  raise SystemExit(f'missing run replacement target: {old}')
              run = run.replace(old, new)
          run_path.write_text(run)

          prompts_path = Path('src/application/prompts.ts')
          prompts = prompts_path.read_text().replace('import { premiseLabFindings, selectedPremiseContext } from "./premise-lab.js";', 'import { selectedPremiseContext } from "./premise-lab.js";')
          prompts_path.write_text(prompts)
          PY
      - run: |
          git checkout origin/main -- .github/workflows/test.yml
          rm .github/workflows/apply-prompt-repair.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/application/stage-specs/index.ts src/application/run.ts src/application/prompts.ts .github/workflows/test.yml .github/workflows/apply-prompt-repair.yml
          git commit -m "fix: preserve prompt parity and runtime budgets"
          git push origin HEAD:feat/compact-prompt-compiler
