name: Integrate premise event wizard and planning context

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/v1.4-4-premise-lab'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v1.4-4-premise-lab
          fetch-depth: 0
      - name: Apply integration
        run: |
          python - <<'PY'
          from pathlib import Path

          # Direct writer decisions and premise-selection replacement.
          path = Path('src/application/intake.ts')
          text = path.read_text(encoding='utf-8')
          interface = '''\nexport interface RecordWriterDecisionInput {\n  scope: IntakeScope;\n  subject: string;\n  choice: string;\n  decidedAt: string;\n  evidenceRefs: string[];\n  replaces?: string | null;\n}\n'''
          anchor = '''export interface DecideAssumptionInput {\n  assumptionId: string;\n  choice: string;\n  decidedAt: string;\n  evidenceRefs: string[];\n}\n'''
          if interface.strip() not in text:
              text = text.replace(anchor, anchor + interface, 1)
          function = '''\nexport function recordWriterDecision(ledger: DecisionLedger, input: RecordWriterDecisionInput): DecisionLedger {\n  assertValidLedger(ledger);\n  const result = cloneLedger(ledger);\n  const scope = nonBlank(input.scope, "Writer decision scope") as IntakeScope;\n  const subject = nonBlank(input.subject, "Writer decision subject");\n  const replaced = new Set(result.decisions.map((item) => item.replaces).filter((item): item is string => Boolean(item)));\n  const active = result.decisions.find((item) => item.scope === scope && item.subject === subject && !replaced.has(item.id));\n  const replacement = input.replaces ?? null;\n  if (active && replacement !== active.id) throw new Error(`An active writer decision already exists for ${scope}/${subject}; replace ${active.id} explicitly.`);\n  if (!active && replacement) throw new Error(`Cannot replace inactive or unknown writer decision ${replacement}.`);\n  result.decisions.push({\n    id: nextId(result.decisions.map((item) => item.id), "DEC"),\n    scope,\n    subject,\n    choice: nonBlank(input.choice, "Writer decision choice"),\n    decidedAt: nonBlank(input.decidedAt, "Writer decision time"),\n    evidenceRefs: uniqueStrings(input.evidenceRefs, "Writer decision", true),\n    replaces: replacement,\n  });\n  assertValidLedger(result);\n  return result;\n}\n'''
          anchor = '\nexport function replaceWriterDecision('
          if function.strip() not in text:
              text = text.replace(anchor, function + anchor, 1)
          path.write_text(text, encoding='utf-8')

          # Premise wizard replaces an existing active premise decision when needed.
          path = Path('src/application/intake-wizard.ts')
          text = path.read_text(encoding='utf-8')
          old = '''      const ledger = recordWriterDecision(state.ledger, {\n        scope: state.bookId as `book-${string}`,\n        subject: "premise-selection",\n        choice: variantId,\n        decidedAt,\n        evidenceRefs,\n      });\n'''
          new = '''      const replacedIds = new Set(state.ledger.decisions.map((item) => item.replaces).filter((item): item is string => Boolean(item)));\n      const active = state.ledger.decisions.find((item) => item.scope === state.bookId && item.subject === "premise-selection" && !replacedIds.has(item.id));\n      const ledger = recordWriterDecision(state.ledger, {\n        scope: state.bookId as `book-${string}`,\n        subject: "premise-selection",\n        choice: variantId,\n        decidedAt,\n        evidenceRefs,\n        ...(active ? { replaces: active.id } : {}),\n      });\n'''
          if old not in text:
              raise SystemExit('premise decision anchor missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          # Repair event syntax and state-neutral update.
          path = Path('src/application/events.ts')
          text = path.read_text(encoding='utf-8')
          start = text.index('    if (blockers.length) throw new Error(`Premise validation blocked the event:')
          end = text.index('  }\n  if (input.eventType === "intake-update")', start)
          replacement = '    if (blockers.length) throw new Error(`Premise validation blocked the event:\\n${blockers.map((item) => `- ${item.message}`).join("\\n")}`);\n'
          text = text[:start] + replacement + text[end:]
          anchor = '''    case "intake-update":\n      break;\n'''
          if 'case "premise-update"' not in text:
              text = text.replace(anchor, anchor + '    case "premise-update":\n      break;\n', 1)
          text = text.replace('if (input.eventType !== "research-update" && input.eventType !== "intake-update")', 'if (input.eventType !== "research-update" && input.eventType !== "intake-update" && input.eventType !== "premise-update")', 1)
          path.write_text(text, encoding='utf-8')

          # Classify premise validation as schema validation.
          path = Path('src/application/event-rejection.ts')
          text = path.read_text(encoding='utf-8')
          old = 'lower.includes("decision ledger validation")'
          if old in text and 'lower.includes("premise validation")' not in text:
              text = text.replace(old, old + ' || lower.includes("premise validation")', 1)
          path.write_text(text, encoding='utf-8')

          # Wizard workflow contract and session allowlist.
          path = Path('src/wizard/types.ts')
          text = path.read_text(encoding='utf-8').replace('"next-book" | "research";', '"next-book" | "research" | "premise";', 1)
          path.write_text(text, encoding='utf-8')
          path = Path('src/wizard/session.ts')
          text = path.read_text(encoding='utf-8').replace('["adoption", "readers", "packaging", "next-book", "research"]', '["adoption", "readers", "packaging", "next-book", "research", "premise"]', 1)
          path.write_text(text, encoding='utf-8')

          # Wizard registry and launch.
          path = Path('src/application/wizard.ts')
          text = path.read_text(encoding='utf-8')
          text = text.replace('Exclude<WizardWorkflow, "research">', 'Exclude<WizardWorkflow, "research" | "premise">', 1)
          text = text.replace('if (workflow === "research") throw new Error("research snapshot is not available yet.");', 'if (workflow === "research" || workflow === "premise") throw new Error(`${workflow} snapshot is not available yet.`);', 1)
          path.write_text(text, encoding='utf-8')
          path = Path('src/application/wizard-launch.ts')
          text = path.read_text(encoding='utf-8')
          anchor = 'import { createResearchWizardHandler } from "./research/wizard.js";\n'
          line = 'import { createPremiseWizardHandler } from "./intake-wizard.js";\n'
          if line not in text:
              text = text.replace(anchor, anchor + line, 1)
          anchor = '    research: createResearchWizardHandler(key, { resolveSource: resolveUpload }),\n'
          if 'premise: createPremiseWizardHandler(key)' not in text:
              text = text.replace(anchor, anchor + '    premise: createPremiseWizardHandler(key),\n', 1)
          path.write_text(text, encoding='utf-8')

          # Premise planning prompts and selected context.
          path = Path('src/application/prompts.ts')
          text = path.read_text(encoding='utf-8')
          import_anchor = 'import { DecisionLedgerSchema, IntakeSchema, type DecisionLedger, type IntakeState } from "../domain/v1-4-schemas.js";\n'
          imports = 'import { PremiseLabSchema, type PremiseLab } from "../domain/v1-4-schemas.js";\nimport { premiseLabFindings, selectedPremiseContext } from "./premise-lab.js";\n'
          if 'selectedPremiseContext' not in text:
              text = text.replace(import_anchor, import_anchor + imports, 1)
          helper = '''\nfunction activePremiseLab(root: string): PremiseLab | null {\n  const book = readBook(root);\n  const text = readText(join(root, "books", book.book_id, "premise-lab.yaml"));\n  return text ? parseYaml<PremiseLab>(text, PremiseLabSchema, `books/${book.book_id}/premise-lab.yaml`) : null;\n}\n\nexport function premisePlanPrompt(root: string): string {\n  const book = readBook(root);\n  const lab = activePremiseLab(root);\n  const rawIdea = lab?.raw_idea.trim() || planningIntakeContext(root).match(/Original author idea:\\n([^\\n]+)/)?.[1] || "";\n  const seedElements = lab?.seed_elements ?? [];\n  return `Use the novel-forge-for-pi skill.\\n\\nProject root: ${root}\\nActive book: ${book.book_id}\\n\\nRaw author idea: ${rawIdea || "not yet supplied"}\\nSeed elements: ${seedElements.length ? seedElements.join(", ") : "derive only from the author idea and explicit decisions"}\\n\\nPrepare three to five recognizable structural premise variants. Variant 1 is the raw-idea baseline or closest faithful expansion. Preserve every declared seed element in every variant. Give each variant a unique story engine, central final-page question, immediate gain, deferred cost, irreversible effect, differentiation, series potential, accepted tradeoffs, and neutral diagnostic observations. Do not score, rank, recommend, or choose a winner. Do not read or use private taste-profile influence names. Present the comparison for an explicit writer decision.\\n\\nUse the state-neutral \\`premise-update\\` event for comparison evidence and the decision ledger. Never select a variant without the matching writer decision.\\n\\n${eventRule(root, "premise-update", "book-planning")}`;\n}\n'''
          anchor = '\nexport function voicePlanPrompt(root: string): string {'
          if helper.strip() not in text:
              text = text.replace(anchor, helper + anchor, 1)
          text = text.replace('  const book = readBook(root);\n  const profile = getProfile(book.profile);\n  return `Use the novel-forge-for-pi skill.', '  const book = readBook(root);\n  const profile = getProfile(book.profile);\n  const premiseContext = selectedPremiseContext(activePremiseLab(root));\n  return `Use the novel-forge-for-pi skill.', 1)
          text = text.replace('Active book: ${book.book_id}\n\n${intakeContext ? intakeContext + "\n\n" : ""}${interviewRule}', 'Active book: ${book.book_id}\n\n${intakeContext ? intakeContext + "\n\n" : ""}${premiseContext ? premiseContext + "\n\n" : ""}${interviewRule}', 1)
          path.write_text(text, encoding='utf-8')

          # Guide action.
          path = Path('src/application/guide.ts')
          text = path.read_text(encoding='utf-8')
          text = text.replace('| "status" | "readers" | "research" | "adopt"', '| "status" | "readers" | "research" | "premise" | "adopt"', 1)
          anchor = '  if (project.current_stage !== "complete") actions.push(action("research", "Review voice and research evidence", "Open the local preview-and-apply workspace for influences, anonymous voice calibration, public-market friction, research readiness, and approved learning rules."));\n'
          addition = '''  if (project.current_stage === "book-planning") {\n    const premise = readText(join(root, "books", book.book_id, "premise-lab.yaml")) ?? "";\n    if (!/selected_variant_id:\\s*PV-[0-9]{3}/.test(premise)) actions.push(action("premise", "Compare and select a premise", "Open the local structural premise laboratory and record the writer's explicit selection."));\n  }\n'''
          if addition.strip() not in text:
              text = text.replace(anchor, anchor + addition, 1)
          path.write_text(text, encoding='utf-8')

          # Pi command and guided action.
          path = Path('src/pi/extension.ts')
          text = path.read_text(encoding='utf-8')
          text = text.replace('else if (id === "research") await openWizard(root, context, "research");', 'else if (id === "research") await openWizard(root, context, "research");\n  else if (id === "premise") await openWizard(root, context, "premise");', 1)
          text = text.replace('["adoption", "readers", "packaging", "next-book", "research"]', '["adoption", "readers", "packaging", "next-book", "research", "premise"]')
          text = text.replace('adoption, readers, packaging, next-book, or research work', 'adoption, readers, packaging, next-book, research, or premise work')
          text = text.replace('adoption, readers, packaging, next-book, or research.', 'adoption, readers, packaging, next-book, research, or premise.')
          path.write_text(text, encoding='utf-8')

          # Browser tab, form, styles, routing.
          path = Path('wizard/index.html')
          text = path.read_text(encoding='utf-8')
          anchor = '      <button data-workflow="research">Voice & research</button>\n'
          if 'data-workflow="premise"' not in text:
              text = text.replace(anchor, anchor + '      <button data-workflow="premise">Premise lab</button>\n', 1)
          path.write_text(text, encoding='utf-8')
          path = Path('wizard/styles.css')
          text = path.read_text(encoding='utf-8').replace('grid-template-columns: repeat(5, minmax(0,1fr));', 'grid-template-columns: repeat(6, minmax(0,1fr));', 1)
          path.write_text(text, encoding='utf-8')
          path = Path('wizard/app.js')
          text = path.read_text(encoding='utf-8')
          form = '''\nfunction premiseForm() {\n  const data = currentSnapshot.workflow;\n  const draft = { schema_version: "1.0.0", book_id: data.book_id, raw_idea: data.raw_idea || "", seed_elements: data.seed_elements || [], variants: data.variants || [], selected_variant_id: data.selected_variant_id || null, selection_decision_id: data.selection_decision_id || null };\n  content.innerHTML = `<div class="wizard-stack"><section class="card"><h3>Premise Laboratory</h3><p>Compare structural engines without scores or an automatic winner. The writer makes the final decision.</p><label>Raw author idea<textarea id="premise-lab-json" rows="22">${escapeHtml(pretty(draft))}</textarea></label><label>Seed elements are stored inside the typed JSON above.</label><div class="button-row"><button id="preview-premise">Preview comparison</button><button id="save-premise" class="danger" disabled>Save comparison</button></div></section><section class="card"><h3>Explicit writer decision</h3><label>Variant <select id="premise-selection">${(data.variants || []).map((item) => `<option value="${escapeHtml(item.id)}">${escapeHtml(item.id)} — ${escapeHtml(item.title)}</option>`).join("")}</select></label><label>Evidence note <input id="premise-evidence" value="writer selected after comparison"></label><div class="button-row"><button id="preview-premise-selection">Preview selection</button><button id="apply-premise-selection" class="danger" disabled>Select variant</button></div></section></div>`;\n  let comparison = null; let selection = null;\n  const preview = (action, payload) => api("/api/preview", { method: "POST", body: JSON.stringify({ workflow: "premise", action, payload }) });\n  document.querySelector("#preview-premise").addEventListener("click", async () => { try { comparison = await preview("comparison", { lab: JSON.parse(fieldValue("premise-lab-json")) }); document.querySelector("#save-premise").disabled = false; setResult(comparison); } catch (error) { setResult(error.message, true); } });\n  document.querySelector("#save-premise").addEventListener("click", async () => { try { await applyAction("save-comparison", { preview_id: comparison.preview_id }); } catch (error) { setResult(error.message, true); } });\n  document.querySelector("#preview-premise-selection").addEventListener("click", async () => { try { selection = await preview("selection", { variant_id: fieldValue("premise-selection"), decided_at: new Date().toISOString(), evidence_refs: [fieldValue("premise-evidence")] }); document.querySelector("#apply-premise-selection").disabled = false; setResult(selection); } catch (error) { setResult(error.message, true); } });\n  document.querySelector("#apply-premise-selection").addEventListener("click", async () => { try { await applyAction("select-variant", { preview_id: selection.preview_id }); } catch (error) { setResult(error.message, true); } });\n}\n'''
          anchor = '\nfunction renderWorkflow() {'
          if 'function premiseForm()' not in text:
              text = text.replace(anchor, form + anchor, 1)
          text = text.replace('  else if (activeWorkflow === "research") researchForm();\n', '  else if (activeWorkflow === "research") researchForm();\n  else if (activeWorkflow === "premise") premiseForm();\n', 1)
          text = text.replace('research: "Voice and research evidence"', 'research: "Voice and research evidence", premise: "Premise laboratory"', 1)
          path.write_text(text, encoding='utf-8')

          # Compact project control count increases by one book file.
          path = Path('tests/project-store.test.ts')
          text = path.read_text(encoding='utf-8').replace('controls.length <= 31', 'controls.length <= 32', 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit and remove helper
        run: |
          rm -f .github/workflows/v1-4-4-integration-apply.yml
          touch docs/.v1-4-4-integration-ready
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: integrate premise selection workflow"
          git push origin HEAD:agent/v1.4-4-premise-lab
