name: Refresh compact prompt compiler branch

on:
  push:
    branches: [feat/compact-prompt-compiler]

permissions:
  contents: write

jobs:
  refresh:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/compact-prompt-compiler
          fetch-depth: 0
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-commit --no-ff origin/main
          rm .github/workflows/refresh-compact-prompt-branch.yml
          git add -A
          git commit -m "Merge repaired main into compact prompt compiler"
          git push origin HEAD:feat/compact-prompt-compiler
