name: Repair structured rejection typing

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/v1.4-2-structured-rejections'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v1.4-2-structured-rejections
          fetch-depth: 0
      - run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/pi/extension.ts')
          text = path.read_text(encoding='utf-8')
          old = 'const rejection = normalizeEventRejection(error, { root, currentStage, currentProjectHash });'
          new = 'const rejection = normalizeEventRejection(error, { currentStage, currentProjectHash, ...(root ? { root } : {}) });'
          if old not in text:
              raise SystemExit('optional-root anchor missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm -f .github/workflows/v1-4-2-type-fix.yml
          touch docs/.v1-4-2-type-ready
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: omit unresolved root from rejection context"
          git push origin HEAD:agent/v1.4-2-structured-rejections
