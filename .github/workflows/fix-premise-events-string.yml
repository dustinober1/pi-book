name: Fix premise event validation string

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/fix-premise-events-string.py
      - .github/workflows/fix-premise-events-string.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v1.4-4-premise-lab
          fetch-depth: 0
      - run: python scripts/fix-premise-events-string.py
      - run: |
          rm -f .github/workflows/fix-premise-events-string.yml
          rm -f scripts/fix-premise-events-string.py
          touch docs/.premise-string-ready
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: repair premise validation diagnostic [premise-string-fixed]"
          git push origin HEAD:agent/v1.4-4-premise-lab
