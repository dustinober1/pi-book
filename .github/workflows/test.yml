name: Novel Forge tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run eval
      - run: npm pack --dry-run
