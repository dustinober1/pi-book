name: Novel Forge tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-v1-7-release-tree:
    if: github.event_name == 'push' && github.ref == 'refs/heads/feature/quality-evaluation-release-1-7'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/quality-evaluation-release-1-7
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: node scripts/.tmp-apply-v1-7-release.mjs
      - shell: bash
        run: |
          if git diff --quiet; then
            echo "Release tree is already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src/application/version-core.ts .gitignore README.md SKILL.md CHANGELOG.md RELEASE.md docs/quality-and-cost.md docs/releases/v1.7.0.md .github/workflows/test.yml .github/workflows/release-v1-7.yml
          git commit -m "release: qualify Novel Forge 1.7.0 quality orchestration"
          git push origin HEAD:feature/quality-evaluation-release-1-7

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22.19.0', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Run TypeScript check
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          cat typecheck.log
          exit 0
      - name: Run tests
        id: tests
        if: steps.typecheck.outputs.code == '0'
        shell: bash
        run: |
          set +e
          npm test > test.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          cat test.log
          exit 0
      - name: Enforce TypeScript result
        if: steps.typecheck.outputs.code != '0'
        run: exit 1
      - name: Enforce test result
        if: steps.typecheck.outputs.code == '0' && steps.tests.outputs.code != '0'
        run: exit 1
      - run: npm run eval
      - name: Run constrained runtime benchmark
        run: npm run --silent benchmark:constrained-runtime > constrained-runtime-benchmark.json
      - name: Run prompt compiler benchmark
        run: npm run --silent benchmark:prompts > prompt-compiler-benchmark.json
      - run: npm run verify:release
      - run: npm pack --dry-run
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: novel-forge-ci-node-${{ matrix.node }}
          path: |
            typecheck.log
            test.log
            constrained-runtime-benchmark.json
            prompt-compiler-benchmark.json
