name: Novel Forge tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22.19.0', '24']
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install and regenerate lockfile during v1.2 development
        run: npm install --ignore-scripts
      - name: Commit generated lockfile
        if: matrix.node == '24'
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Lockfile already current."
            exit 0
          fi
          git config user.name "Novel Forge CI"
          git config user.email "novel-forge@localhost"
          git add package-lock.json
          git commit -m "chore: regenerate v1.2 lockfile"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
      - name: Run TypeScript check
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          cat typecheck.log
          exit 0
      - name: Run tests
        id: tests
        if: steps.typecheck.outputs.code == '0'
        shell: bash
        run: |
          set +e
          npm test > test.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          cat test.log
          exit 0
      - name: Upload diagnostics and generated lockfile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: novel-forge-ci-node-${{ matrix.node }}
          path: |
            typecheck.log
            test.log
            package-lock.json
      - name: Enforce TypeScript result
        if: steps.typecheck.outputs.code != '0'
        run: exit 1
      - name: Enforce test result
        if: steps.typecheck.outputs.code == '0' && steps.tests.outputs.code != '0'
        run: exit 1
      - run: npm run eval
      - run: npm pack --dry-run
