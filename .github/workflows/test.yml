name: Novel Forge tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22.19.0', '24']
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Synchronize release metadata artifacts
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          lock.version = '1.7.0';
          lock.packages[''].version = '1.7.0';
          fs.writeFileSync('package-lock.json', JSON.stringify(lock, null, 2) + '\n');

          const skillPath = 'SKILL.md';
          let skill = fs.readFileSync(skillPath, 'utf8');
          const section = `## Quality, budget, and authority\n\n- Existing projects without quality configuration resolve to **economy** and keep the original single host-prompt path. Never silently increase spend.\n- Treat genre profile, runtime profile, and quality tier as separate controls. Show them separately in status and handoff.\n- Higher tiers use isolated Pi print-mode workers with tools, skills, extensions, sessions, and context files disabled. Pass prompts and bounded evidence through stdin, not process arguments.\n- Reserve token and call capacity before every inference and settle reservations afterward. Stop or downgrade exactly as the project budget specifies.\n- Scene plans, candidates, critiques, claim maps, rejected outputs, and evaluation artifacts are cache-only and have no canonical authority.\n- Every accepted creative change ends in one existing guarded event transaction. Never apply candidate prose or control-file changes directly.\n- Telemetry may store hashes, usage, cost, tier, pass, and safe finish categories. Never store prompts, manuscript prose, source excerpts, model outputs, private reasoning, or credentials.\n- High-risk research requires bounded evidence anchors. Unsupported high-risk chapter claims block; eligible lower-risk findings receive at most one targeted repair followed by re-audit.\n- Automated diagnostics and paid quality evaluations are not human reader evidence and never update reader experiments. Paid evaluation is explicit opt-in and never normal CI.\n\n`;
          if (!skill.includes('## Quality, budget, and authority')) {
            skill = skill.replace('## Core rules\n', section + '## Core rules\n');
            fs.writeFileSync(skillPath, skill);
          }
          NODE
      - name: Commit synchronized release files
        if: matrix.node == '24'
        run: |
          if ! git diff --quiet -- package-lock.json SKILL.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package-lock.json SKILL.md
            git commit -m "release: synchronize 1.7 metadata and skill authority"
            git push origin HEAD:feature/quality-evaluation-release
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Run TypeScript check
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          cat typecheck.log
          exit 0
      - name: Run tests
        id: tests
        if: steps.typecheck.outputs.code == '0'
        shell: bash
        run: |
          set +e
          npm test > test.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          cat test.log
          exit 0
      - name: Enforce TypeScript result
        if: steps.typecheck.outputs.code != '0'
        run: exit 1
      - name: Enforce test result
        if: steps.typecheck.outputs.code == '0' && steps.tests.outputs.code != '0'
        run: exit 1
      - run: npm run eval
      - name: Run constrained runtime benchmark
        run: npm run --silent benchmark:constrained-runtime > constrained-runtime-benchmark.json
      - name: Run prompt compiler benchmark
        run: npm run --silent benchmark:prompts > prompt-compiler-benchmark.json
      - run: npm run verify:release
      - run: npm run test:release
      - run: npm pack --dry-run
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: novel-forge-ci-node-${{ matrix.node }}
          path: |
            package-lock.json
            SKILL.md
            typecheck.log
            test.log
            constrained-runtime-benchmark.json
            prompt-compiler-benchmark.json
