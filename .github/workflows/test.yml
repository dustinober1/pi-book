name: Novel Forge tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22.19.0', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Run TypeScript check
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          cat typecheck.log
          exit 0
      - name: Run tests
        id: tests
        if: steps.typecheck.outputs.code == '0'
        shell: bash
        run: |
          set +e
          npm test > test.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          cat test.log
          exit 0
      - name: Enforce TypeScript result
        if: steps.typecheck.outputs.code != '0'
        run: exit 1
      - name: Enforce test result
        if: steps.typecheck.outputs.code == '0' && steps.tests.outputs.code != '0'
        run: exit 1
      - run: npm run eval
      - name: Run constrained runtime benchmark
        run: npm run --silent benchmark:constrained-runtime > constrained-runtime-benchmark.json
      - run: npm run verify:release
      - run: npm pack --dry-run
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: novel-forge-ci-node-${{ matrix.node }}
          path: |
            typecheck.log
            test.log
            constrained-runtime-benchmark.json
            src/application/stage-specs/index.ts
            src/application/run.ts
            src/application/prompts.ts
