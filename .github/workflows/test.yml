name: Novel Forge tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - name: Run TypeScript check
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          cat typecheck.log
          exit 0
      - name: Run tests
        id: tests
        if: steps.typecheck.outputs.code == '0'
        shell: bash
        run: |
          set +e
          npm test > test.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          cat test.log
          exit 0
      - name: Upload diagnostics and resolved lockfile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: novel-forge-ci-diagnostics
          path: |
            typecheck.log
            test.log
            package-lock.json
      - name: Enforce TypeScript result
        if: steps.typecheck.outputs.code != '0'
        run: exit 1
      - name: Enforce test result
        if: steps.typecheck.outputs.code == '0' && steps.tests.outputs.code != '0'
        run: exit 1
      - run: npm run eval
      - run: npm pack --dry-run
      - name: Commit verified lockfile once
        if: github.event_name == 'push' && github.ref == 'refs/heads/novel-forge-v1'
        shell: bash
        run: |
          if git status --porcelain -- package-lock.json | grep -q .; then
            git config user.name "Novel Forge CI"
            git config user.email "novel-forge-ci@users.noreply.github.com"
            git add package-lock.json
            git commit -m "Add reproducible npm lockfile"
            git push origin HEAD:novel-forge-v1
          fi
