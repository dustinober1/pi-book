name: Novel Forge tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22.19.0', '24']
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Apply rolling-window source patch
        if: github.head_ref == 'agent/v1.4-6-rolling-packet-windows' || github.ref_name == 'agent/v1.4-6-rolling-packet-windows'
        run: python scripts/apply-v1-4-6-window-integration.py
      - name: Persist rolling-window source patch
        if: matrix.node == '22.19.0' && (github.head_ref == 'agent/v1.4-6-rolling-packet-windows' || github.ref_name == 'agent/v1.4-6-rolling-packet-windows')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src
          git commit -m "feat: integrate rolling packet windows" || exit 0
          git push origin HEAD:agent/v1.4-6-rolling-packet-windows
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Run TypeScript check
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          cat typecheck.log
          exit 0
      - name: Run tests
        id: tests
        if: steps.typecheck.outputs.code == '0'
        shell: bash
        run: |
          set +e
          npm test > test.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          cat test.log
          exit 0
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: novel-forge-ci-node-${{ matrix.node }}
          path: |
            typecheck.log
            test.log
      - name: Enforce TypeScript result
        if: steps.typecheck.outputs.code != '0'
        run: exit 1
      - name: Enforce test result
        if: steps.typecheck.outputs.code == '0' && steps.tests.outputs.code != '0'
        run: exit 1
      - run: npm run eval
      - run: npm run verify:release
      - run: npm pack --dry-run
