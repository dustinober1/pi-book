name: Temporary event export

on:
  push:
    branches:
      - feat/canonical-story-contract-integration

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: events-source
          path: src/application/events.ts
          if-no-files-found: error
