name: Phase 7 exact-head proof

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/phase7-proof.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22.19.0, 24]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v1.3-phase7-release
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run eval
      - run: npm run verify:release
      - run: npm pack --dry-run

  record:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v1.3-phase7-release
          fetch-depth: 0
      - run: |
          rm -f .github/workflows/phase7-proof.yml
          touch docs/.phase7-proof-ready
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: record Phase 7 exact-head proof [phase7-proof-passed]"
          git push origin HEAD:agent/v1.3-phase7-release
