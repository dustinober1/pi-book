name: Merge verified Novel Forge 1.3 release candidate

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/phase7-merge.yml
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  verify-clean-merge:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v1.3-phase7-release
          fetch-depth: 0
      - name: Verify candidate on Node 22.19.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run eval
      - run: npm run verify:release
      - run: npm pack --dry-run
      - name: Verify candidate on Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run eval
      - run: npm run verify:release
      - run: npm pack --dry-run
      - name: Remove all temporary Phase 7 proof files
        run: |
          rm -f .github/workflows/phase7-merge.yml
          rm -f .github/workflows/phase7-proof.yml
          rm -f .github/workflows/phase7-finalize.yml
          rm -f docs/.phase7-proof-ready
          rm -f docs/.phase7-final-ready
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: remove Phase 7 proof helpers before merge"
            git push origin HEAD:agent/v1.3-phase7-release
          fi
          echo "FINAL_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: Verify cleaned exact head on Node 22.19.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run eval
      - run: npm run verify:release
      - run: npm pack --dry-run
      - name: Verify cleaned exact head on Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run eval
      - run: npm run verify:release
      - run: npm pack --dry-run
      - name: Mark ready and merge exact verified head
        run: |
          gh pr ready 19 --repo dustinober1/pi-book || true
          gh pr merge 19 \
            --repo dustinober1/pi-book \
            --merge \
            --match-head-commit "$FINAL_SHA" \
            --subject "Qualify and release Novel Forge 1.3.0 (#19)" \
            --body "Add deterministic release evaluations, honest clean-project and packed-install journeys, a machine-checkable release verifier, release notes, and verified v1.3.0 publication automation."
