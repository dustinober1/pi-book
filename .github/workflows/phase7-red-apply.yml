name: Apply Phase 7 RED suite

on:
  push:
    branches:
      - agent/v1.3-phase7-release
    paths:
      - scripts/apply-phase7-red.py
      - .github/workflows/phase7-red-apply.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v1.3-phase7-release
          fetch-depth: 0
      - run: python scripts/apply-phase7-red.py
      - run: |
          rm -f .github/workflows/phase7-red-apply.yml
          rm -f scripts/apply-phase7-red.py
          touch docs/.phase7-red-ready
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: specify Novel Forge 1.3 release qualification [phase7-red-applied]"
          git push origin HEAD:agent/v1.3-phase7-release
