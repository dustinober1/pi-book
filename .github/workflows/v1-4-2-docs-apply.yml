name: Apply structured rejection documentation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/v1.4-2-structured-rejections'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v1.4-2-structured-rejections
          fetch-depth: 0
      - name: Update contracts and author guidance
        run: |
          python - <<'PY'
          from pathlib import Path

          def insert_after(path, anchor, addition):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if addition.strip() in text:
                  return
              if anchor not in text:
                  raise SystemExit(f'anchor missing in {path}: {anchor!r}')
              file.write_text(text.replace(anchor, anchor + addition, 1), encoding='utf-8')

          plan = Path('docs/superpowers/plans/2026-07-16-v1-4-2-structured-rejections.md')
          text = plan.read_text(encoding='utf-8')
          anchor = '- Current stage and project hash in rejection details come from canonical project state whenever it can be read safely.\n'
          addition = '- When canonical state cannot be read safely, both public fields remain non-null and use the literal `"unknown"`; normalization must never throw while trying to populate them.\n'
          if addition not in text:
              if anchor not in text:
                  raise SystemExit('plan fallback anchor missing')
              plan.write_text(text.replace(anchor, anchor + addition, 1), encoding='utf-8')

          readme_section = '''\n### Structured rejection envelopes and bounded retry policy\n\nGuarded events, wizard applies, HTTP responses, and the public `novel_apply_event` tool now report the same structured rejection detail: a stable code, sanitized message, retry and reload policy, invalid relative paths, typed issues, and the current stage/project hash when safely readable. If canonical state cannot be read, the stage/hash fields use `unknown` rather than exposing filesystem details or throwing during normalization.\n\nOnly `schema-validation` and `reference-validation` are eligible for one corrected resubmission. The retry must change only the rejected payload. `stale-stage` and `stale-project-hash` require a state reload and a rebuilt proposal. Wrong-stage, allowlist, human-gate, integrity, filesystem, and unknown failures stop automatic work. Eligibility is guidance, not automatic execution.\n\nUnknown errors are reduced to a safe message. Stack traces, absolute project paths, raw thrown objects, tokens, and filesystem internals are never returned in the rejection envelope. Existing human-readable validator text remains available as `message`.\n'''
          insert_after('README.md', '`npm run eval` continues to run the architecture and Novel Forge 1.3 release evaluations, then prints the author-journey baseline as a separate section. Future Author Velocity changes must update these traces only when workflow behavior intentionally changes.\n', readme_section)

          skill_section = '''\n## Structured event rejections\n\nTreat `EventRejectionDetail.code` as the controlling retry signal. Correct and resubmit only `schema-validation` or `reference-validation`, and do so at most once using the same accepted project state. For `stale-stage` or `stale-project-hash`, reload canonical state and rebuild the proposal with the returned current values. For `wrong-stage`, `allowlist-violation`, `human-gate-required`, `integrity-failure`, `filesystem-failure`, or `unknown`, stop automatic work and surface the rejection.\n\nNever infer retryability from message text. Never bypass the allowlist or a human gate. Structured eligibility does not authorize automatic retry execution. Preserve the concise validator message for the writer while using `issues`, `invalidPaths`, `requiresReload`, and `retryable` for deterministic handling. Unknown values must remain sanitized and must not expose stacks, absolute paths, raw objects, credentials, or filesystem internals.\n'''
          insert_after('SKILL.md', 'The read-only `npm run audit:voice -- <project-root>` command may print diagnostics but must not mutate project state or replace guarded workflow events.\n', skill_section)

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          anchor = '- An `eval:journeys` command and an author-journey section in `npm run eval`.\n'
          addition = '- Machine-readable rejection codes and sanitized details across guarded events, wizard applies, HTTP responses, and the Pi tool.\n- A bounded one-retry policy for schema/reference payload repairs, with mandatory reload for stale state and no automatic retry for unsafe failures.\n'
          if addition.strip() not in text:
              if anchor not in text:
                  raise SystemExit('changelog author-velocity anchor missing')
              changelog.write_text(text.replace(anchor, anchor + addition, 1), encoding='utf-8')

          release = Path('RELEASE.md')
          text = release.read_text(encoding='utf-8')
          anchor = '- [ ] Package version and dependency metadata remain unchanged.\n'
          addition = '''- [ ] Invalid YAML returns `schema-validation`, the exact relative path, and one-retry eligibility.\n- [ ] Missing canon or research references return `reference-validation`.\n- [ ] Stale stage/hash rejections require reload and are not retryable.\n- [ ] Disallowed paths and human gates never permit automatic retry.\n- [ ] Wizard and Pi-tool failures expose the same structured detail.\n- [ ] Unknown failures contain no stack trace, absolute project path, or raw thrown object.\n'''
          if addition.strip() not in text:
              if anchor not in text:
                  raise SystemExit('release baseline anchor missing')
              release.write_text(text.replace(anchor, anchor + addition, 1), encoding='utf-8')
          PY
      - name: Commit and remove helper
        run: |
          rm -f .github/workflows/v1-4-2-docs-apply.yml
          touch docs/.v1-4-2-docs-ready
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: document structured rejection handling"
          git push origin HEAD:agent/v1.4-2-structured-rejections
