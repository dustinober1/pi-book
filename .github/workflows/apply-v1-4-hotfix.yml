name: Apply Novel Forge 1.4 metadata repair

on:
  push:
    branches: [fix/complete-v1-4-release]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/complete-v1-4-release
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm version 1.4.0 --no-git-tag-version
      - run: node -e "const fs=require('fs'); const p='src/application/version-core.ts'; fs.writeFileSync(p, fs.readFileSync(p,'utf8').replace('NOVEL_FORGE_VERSION = \"1.3.0\"', 'NOVEL_FORGE_VERSION = \"1.4.0\"'));"
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src/application/version-core.ts
          git commit -m "fix: align Novel Forge 1.4 version metadata"
          git push origin HEAD:fix/complete-v1-4-release
