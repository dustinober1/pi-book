name: Address intake review and documentation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/v1.4-3-intake-decisions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v1.4-3-intake-decisions
          fetch-depth: 0
      - run: |
          python - <<'PY'
          from pathlib import Path

          def insert_after(path, anchor, addition):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if addition.strip() in text:
                  return
              if anchor not in text:
                  raise SystemExit(f'anchor missing in {path}: {anchor!r}')
              file.write_text(text.replace(anchor, anchor + addition, 1), encoding='utf-8')

          # Numeric assumption values and rejected decision resolution.
          path = Path('src/domain/v1-4-schemas.ts')
          text = path.read_text(encoding='utf-8')
          old = '  value: Type.String({ minLength: 1 }),\n'
          new = '  value: Type.Union([Type.String({ minLength: 1 }), Type.Integer()]),\n'
          if old not in text:
              raise SystemExit('assumption value schema anchor missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          path = Path('src/application/intake.ts')
          text = path.read_text(encoding='utf-8')
          text = text.replace('  value: string;\n', '  value: string | number;\n', 1)
          anchor = '''function nonBlank(value: string, label: string): string {\n  const normalized = value.trim();\n  if (!normalized) throw new Error(`${label} must be nonblank.`);\n  return normalized;\n}\n'''
          addition = '''\nfunction assumptionValue(value: string | number, label: string): string | number {\n  if (typeof value === "number") {\n    if (!Number.isInteger(value)) throw new Error(`${label} must be an integer when numeric.`);\n    return value;\n  }\n  return nonBlank(value, label);\n}\n'''
          if addition.strip() not in text:
              if anchor not in text:
                  raise SystemExit('assumption value helper anchor missing')
              text = text.replace(anchor, anchor + addition, 1)
          text = text.replace('value: nonBlank(input.value, "Assumption value"),', 'value: assumptionValue(input.value, "Assumption value"),')
          text = text.replace('assumption.status = choice === "rejected" ? "rejected" : choice === assumption.value ? "confirmed" : "corrected";', 'assumption.status = choice === "rejected" ? "rejected" : choice === String(assumption.value) ? "confirmed" : "corrected";', 1)
          old = '''  const candidates = ledger.decisions.filter((item) => item.scope === scope && item.subject === subject && !replaced.has(item.id));\n  return candidates.at(-1) ?? null;\n'''
          new = '''  const candidates = ledger.decisions.filter((item) => item.scope === scope && item.subject === subject && !replaced.has(item.id));\n  const resolved = candidates.at(-1) ?? null;\n  return resolved?.choice === "rejected" ? null : resolved;\n'''
          if old not in text:
              raise SystemExit('resolved decision anchor missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          # Add regression assertions.
          path = Path('tests/intake-decisions.test.ts')
          text = path.read_text(encoding='utf-8')
          old = '  assert.equal(rejected.decisions[0]?.choice, "rejected");\n'
          new = old + '  assert.equal(resolvedDecision(rejected, "project", "profile"), null);\n'
          if new not in text:
              if old not in text:
                  raise SystemExit('rejection resolution assertion anchor missing')
              text = text.replace(old, new, 1)
          numeric = '''\n\ntest("numeric assumptions support target-word provenance without string coercion", () => {\n  const inferred = inferAssumption(defaultDecisionLedger(), {\n    ...inferredInput,\n    subject: "target_words",\n    value: 110000,\n    affects: ["book-plan"],\n  });\n  assert.equal(inferred.assumptions[0]?.value, 110000);\n  const confirmed = decideAssumption(inferred, { assumptionId: "ASM-001", choice: "110000", decidedAt: "2026-07-16T12:00:00Z", evidenceRefs: ["author"] });\n  assert.equal(confirmed.assumptions[0]?.status, "confirmed");\n});\n'''
          if 'numeric assumptions support target-word provenance' not in text:
              text += numeric
          path.write_text(text, encoding='utf-8')

          # Clarify the plan.
          path = Path('docs/superpowers/plans/2026-07-16-v1-4-3-intake-decisions.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace('  value: string;\n', '  value: string | number; // numeric setup values such as target words remain numeric\n', 1)
          anchor = '- `resolvedDecision` returns the latest unreplaced decision only;\n'
          replacement = '- `resolvedDecision` returns the latest unreplaced usable decision only and returns `null` when the current writer choice is `rejected`;\n'
          if anchor not in text:
              raise SystemExit('plan resolution anchor missing')
          path.write_text(text.replace(anchor, replacement, 1), encoding='utf-8')

          readme_section = '''\n### Typed intake, assumptions, and writer decisions\n\nNovel Forge stores optional setup evidence in `series/intake.yaml` and immutable provenance in `series/decision-ledger.yaml`. Intake may preserve the original idea, authorized brief/sample references, unresolved blockers, and inferred language, profile, audience, or target length. Assumption values may be text or integers, so target-word evidence remains numeric.\n\nAn inferred assumption is never a fact. Confirmation, correction, or rejection appends a writer-decision record and preserves the original assumption value. A later writer correction appends a replacement linked with `replaces`; earlier records remain unchanged. Rejected assumptions do not resolve to usable decisions. Superseding an inference preserves the old record with status `superseded` and appends a new linked assumption.\n\nUse `intake-update` only during voice intake, series planning, or book planning. It may write only the two intake artifacts, does not advance stage or change gates, and still uses typed validation, stale-stage/hash protection, rollback, one Git checkpoint, `STATUS.md`, and `HANDOFF.md`. Existing 1.3 projects without these files remain valid and receive one optional-backfill advisory.\n'''
          insert_after('README.md', 'Unknown errors are reduced to a safe message. Stack traces, absolute project paths, raw thrown objects, tokens, and filesystem internals are never returned in the rejection envelope. Existing human-readable validator text remains available as `message`.\n', readme_section)

          skill_section = '''\n## Intake and decision provenance\n\nNever promote an inferred intake value to confirmed project truth. Store inference in `series/intake.yaml` and an `inferred` assumption in `series/decision-ledger.yaml`. Confirmation, correction, rejection, supersession, or decision replacement must preserve history and append the appropriate linked record. Numeric assumptions such as target words remain integers. A rejected decision is not a resolved usable choice.\n\nVoice and book planning may use only unreplaced writer decisions as settled input. Inferred assumptions may appear only under an unresolved heading with explicit not-confirmed language. Write intake evidence through `intake-update`; never write manuscript, project/book state, gates, reader evidence, publishing, marketing, package output, `STATUS.md`, or `HANDOFF.md` through that event.\n'''
          insert_after('SKILL.md', 'Unknown values must remain sanitized and must not expose stacks, absolute paths, raw objects, credentials, or filesystem internals.\n', skill_section)

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          anchor = '- A bounded one-retry policy for schema/reference payload repairs, with mandatory reload for stale state and no automatic retry for unsafe failures.\n'
          addition = '- Typed intake and append-only assumption/decision provenance, including numeric setup assumptions, explicit rejection, supersession, and decision replacement.\n- A state-neutral `intake-update` event and prompt compilation that uses writer decisions while keeping inference visibly unresolved.\n'
          if addition.strip() not in text:
              if anchor not in text:
                  raise SystemExit('changelog intake anchor missing')
              changelog.write_text(text.replace(anchor, anchor + addition, 1), encoding='utf-8')

          release = Path('RELEASE.md')
          text = release.read_text(encoding='utf-8')
          anchor = '- [ ] Unknown failures contain no stack trace, absolute project path, or raw thrown object.\n'
          addition = '''- [ ] New projects seed empty intake and decision-ledger files without invented evidence.\n- [ ] Existing 1.3 projects without intake files remain unblocked with one advisory.\n- [ ] Inferred assumptions never enter settled prompt decisions.\n- [ ] Confirm, correct, reject, supersede, and replace operations preserve immutable history.\n- [ ] Rejected decisions resolve to no usable choice.\n- [ ] `intake-update` is limited to the two canonical files and remains state-neutral.\n'''
          if addition.strip() not in text:
              if anchor not in text:
                  raise SystemExit('release intake anchor missing')
              release.write_text(text.replace(anchor, anchor + addition, 1), encoding='utf-8')
          PY
      - name: Commit and remove helper
        run: |
          rm -f .github/workflows/v1-4-3-review-docs.yml
          touch docs/.v1-4-3-docs-ready
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: address intake provenance review and guidance"
          git push origin HEAD:agent/v1.4-3-intake-decisions
