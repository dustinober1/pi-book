name: Phase 3 source export

on:
  push:
    branches:
      - agent/v1.3-phase-3-research-friction

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: phase3-source-${{ github.sha }}
          path: .
          include-hidden-files: true
          retention-days: 1
