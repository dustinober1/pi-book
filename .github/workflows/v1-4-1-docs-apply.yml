name: Apply author-journey documentation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/v1.4-1-author-journey-baselines'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v1.4-1-author-journey-baselines
          fetch-depth: 0
      - name: Update plan and documentation
        run: |
          python - <<'PY'
          from pathlib import Path

          def insert_after(path, anchor, addition):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if addition.strip() in text:
                  return
              if anchor not in text:
                  raise SystemExit(f'anchor missing in {path}: {anchor!r}')
              file.write_text(text.replace(anchor, anchor + addition, 1), encoding='utf-8')

          plan = Path('docs/superpowers/plans/2026-07-16-v1-4-1-author-journey-baselines.md')
          text = plan.read_text(encoding='utf-8')
          old = '''- maintain a set of accepted draft chapter numbers;\n- track maximum context characters;\n'''
          new = '''- maintain a set of accepted draft chapter numbers specifically where `action === "draft-chapter"` and `outcome === "accepted"`;\n- count every `writer-approval` event to populate `writerApprovals`;\n- track maximum context characters;\n'''
          if old not in text:
              raise SystemExit('plan reduction-rule anchor missing')
          plan.write_text(text.replace(old, new, 1), encoding='utf-8')

          readme_section = '''\n## 1.4 author-journey throughput baseline\n\nBefore changing intake or automation behavior, Novel Forge records deterministic workflow baselines under `evals/journeys/`. These fixtures count author questions, model prompts, guarded attempts, rejections, permitted retries, writer approvals, unique completed chapters, peak bounded-context characters, and the final explicit stop reason.\n\nThe baseline is intentionally not a performance score and does not use wall-clock timings or telemetry. `contextCharacters` is the maximum observed bounded-context size, duplicate accepted draft events for one chapter count once, and pause/resume events with the same run ID remain one logical journey. Each fixture lists current limitations rather than pretending later Author Velocity targets already pass.\n\nRun the focused baseline tests with:\n\n```bash\nnpm run eval:journeys\n```\n\n`npm run eval` continues to run the architecture and Novel Forge 1.3 release evaluations, then prints the author-journey baseline as a separate section. Future Author Velocity changes must update these traces only when workflow behavior intentionally changes.\n'''
          insert_after('README.md', 'Run `/novel` whenever the current action finishes. It reads project state and shows only the choices that matter now: continue, review a gate, request changes, inspect evidence, adopt an existing manuscript, use real-reader evidence, package the book, recover safely, or create the next installment.\n', readme_section)

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          section = '''\n## Unreleased — Author Velocity baselines\n\n### Added\n\n- Deterministic author-journey traces for brief-to-book-plan, packet-window drafting, pause/resume drafting, and twelve-ticket revision work.\n- Exact counts for questions, prompts, guarded attempts, rejections, retries, approvals, unique completed chapters, peak context characters, and stop reasons.\n- An `eval:journeys` command and an author-journey section in `npm run eval`.\n\n### Boundaries\n\n- Baselines use no wall-clock timing, telemetry, remote service, workflow mutation, or claim that future Author Velocity targets already pass.\n\n'''
          if section.strip() not in text:
              text = text.replace('# Changelog\n', '# Changelog\n' + section, 1)
              changelog.write_text(text, encoding='utf-8')

          release = Path('RELEASE.md')
          text = release.read_text(encoding='utf-8')
          section = '''\n## Version 1.4.0 — Author Velocity baseline entry gate\n\nThe first 1.4 pull request changes evaluation only. It must not change production workflow behavior or package version.\n\n- [ ] Four journey fixtures load and pass with at least one explicit current limitation each.\n- [ ] Four author questions report exactly four.\n- [ ] Duplicate accepted `draft-chapter` events do not inflate completed chapters.\n- [ ] Pause and resume under one run ID preserve all counters.\n- [ ] Rejected attempts and permitted retries are counted independently.\n- [ ] Human gates and requested targets remain explicit stop reasons.\n- [ ] `contextCharacters` records the maximum observed size.\n- [ ] Architecture and Novel Forge 1.3 release fixtures remain unchanged and passing.\n- [ ] Package version and dependency metadata remain unchanged.\n\n'''
          if section.strip() not in text:
              text = text.replace('# Novel Forge Release Checklist\n', '# Novel Forge Release Checklist\n' + section, 1)
              release.write_text(text, encoding='utf-8')
          PY
      - name: Commit and remove helper
        run: |
          rm -f .github/workflows/v1-4-1-docs-apply.yml
          touch docs/.v1-4-1-docs-ready
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: document author-journey baseline semantics"
          git push origin HEAD:agent/v1.4-1-author-journey-baselines
