name: Apply Phase 6 research UI

on:
  push:
    branches:
      - agent/v1.3-phase6-research-wizard
    paths:
      - scripts/apply-phase6-research-ui.py
      - .github/workflows/phase6-research-ui-apply.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v1.3-phase6-research-wizard
          fetch-depth: 0
      - run: python scripts/apply-phase6-research-ui.py
      - run: |
          rm -f .github/workflows/phase6-research-ui-apply.yml
          rm -f scripts/apply-phase6-research-ui.py
          touch docs/.phase6-research-ui-ready
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add guided research wizard UI [phase6-ui-applied]"
          git push origin HEAD:agent/v1.3-phase6-research-wizard
