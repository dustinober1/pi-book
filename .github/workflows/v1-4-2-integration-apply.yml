name: Integrate structured rejection boundaries

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/v1.4-2-structured-rejections'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v1.4-2-structured-rejections
          fetch-depth: 0
      - name: Apply coordinated integration
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'anchor missing in {path}: {old[:80]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          # Guarded event boundary.
          path = Path('src/application/events.ts')
          text = path.read_text(encoding='utf-8')
          anchor = 'import { projectStateHash } from "./project-hash.js";\n'
          line = 'import { normalizeEventRejection } from "./event-rejection.js";\n'
          if line not in text:
              text = text.replace(anchor, anchor + line, 1)
          text = text.replace('export function applyNovelEvent(root: string, input: NovelEventInput): NovelEventResult {', 'function applyNovelEventInternal(root: string, input: NovelEventInput): NovelEventResult {', 1)
          wrapper = '''\n\nexport function applyNovelEvent(root: string, input: NovelEventInput): NovelEventResult {\n  let currentStage = String(input.expectedStage || "unknown");\n  let currentProjectHash = String(input.expectedProjectHash || "unknown");\n  try {\n    const current = readProject(root);\n    currentStage = current.current_stage;\n    currentProjectHash = projectStateHash(root);\n  } catch {\n    // The normalizer will classify project-read failures without exposing paths.\n  }\n  try {\n    return applyNovelEventInternal(root, input);\n  } catch (error) {\n    throw normalizeEventRejection(error, { root, currentStage, currentProjectHash });\n  }\n}\n'''
          if wrapper.strip() not in text:
              text += wrapper
          path.write_text(text, encoding='utf-8')

          # Wizard registry boundary.
          path = Path('src/application/wizard.ts')
          text = path.read_text(encoding='utf-8')
          anchor = 'import { getProjectStatus } from "./status.js";\n'
          line = 'import { normalizeEventRejection } from "./event-rejection.js";\n'
          if line not in text:
              text = text.replace(anchor, anchor + line, 1)
          old = '''    apply(envelope) {\n      const project = readProject(root);\n      if (envelope.expected_stage !== project.current_stage) throw new Error(`Stale wizard stage: expected ${envelope.expected_stage}, current ${project.current_stage}.`);\n      if (envelope.expected_project_hash !== projectStateHash(root)) throw new Error("Stale wizard project hash; reload the workflow before applying.");\n      const handler = handlers[envelope.workflow];\n      if (!handler?.apply) throw new Error(`${envelope.workflow} apply action ${envelope.action} is not available yet.`);\n      return handler.apply(envelope);\n    },\n'''
          new = '''    apply(envelope) {\n      const project = readProject(root);\n      const currentProjectHash = projectStateHash(root);\n      try {\n        if (envelope.expected_stage !== project.current_stage) throw new Error(`Stale wizard stage: expected ${envelope.expected_stage}, current ${project.current_stage}.`);\n        if (envelope.expected_project_hash !== currentProjectHash) throw new Error("Stale wizard project hash; reload the workflow before applying.");\n        const handler = handlers[envelope.workflow];\n        if (!handler?.apply) throw new Error(`${envelope.workflow} apply action ${envelope.action} is not available yet.`);\n        return handler.apply(envelope);\n      } catch (error) {\n        throw normalizeEventRejection(error, { root, currentStage: project.current_stage, currentProjectHash });\n      }\n    },\n'''
          if old not in text:
              raise SystemExit('wizard apply anchor missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          # HTTP error envelope.
          path = Path('src/wizard/session.ts')
          text = path.read_text(encoding='utf-8')
          anchor = 'import { openWizardBrowser } from "./browser.js";\n'
          line = 'import { NovelEventRejection } from "../application/event-rejection.js";\n'
          if line not in text:
              text = text.replace(anchor, line + anchor, 1)
          old = '''    } catch (error) {\n      const statusCode = typeof error === "object" && error !== null && "statusCode" in error ? Number((error as { statusCode: number }).statusCode) : 500;\n      sendJson(res, statusCode, { error: error instanceof Error ? error.message : String(error) });\n    }\n'''
          new = '''    } catch (error) {\n      if (error instanceof NovelEventRejection) {\n        const statusCode = error.detail.code === "schema-validation" || error.detail.code === "reference-validation"\n          ? 422\n          : error.detail.code === "allowlist-violation"\n            ? 403\n            : error.detail.requiresReload || error.detail.code === "wrong-stage" || error.detail.code === "human-gate-required"\n              ? 409\n              : 500;\n        sendJson(res, statusCode, { error: error.message, rejection: error.detail });\n        return;\n      }\n      const statusCode = typeof error === "object" && error !== null && "statusCode" in error ? Number((error as { statusCode: number }).statusCode) : 500;\n      sendJson(res, statusCode, { error: error instanceof Error ? error.message : String(error) });\n    }\n'''
          if old not in text:
              raise SystemExit('wizard session catch anchor missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          # Pi tool boundary.
          path = Path('src/pi/extension.ts')
          text = path.read_text(encoding='utf-8')
          text = text.replace('import { applyNovelEvent, type NovelEventType } from "../application/events.js";', 'import { applyNovelEvent, projectStateHash, type NovelEventType } from "../application/events.js";', 1)
          anchor = 'import type { WizardWorkflow } from "../wizard/types.js";\n'
          line = 'import { normalizeEventRejection, rejectionInstruction } from "../application/event-rejection.js";\n'
          if line not in text:
              text = text.replace(anchor, anchor + line, 1)
          old = '''    async execute(_toolCallId, params, _signal, _onUpdate, ctx) {\n      try {\n        const root = requireProjectRoot(params.project_root || ctx.cwd);\n        const files = params.files.map((file) => ({ path: file.path, content: file.content }));\n        const result = applyNovelEvent(root, {\n          eventType: params.event_type as NovelEventType,\n          expectedStage: params.expected_stage as Stage,\n          expectedProjectHash: params.expected_project_hash,\n          files,\n          ...(params.chapter !== undefined ? { chapter: params.chapter } : {}),\n          ...(params.scope ? { scope: params.scope } : {}),\n        });\n        const text = `Applied ${params.event_type}.\\nStage: ${result.stage}\\nChanged: ${result.changed.join(", ")}\\nProject hash: ${result.projectHash}\\nGit: ${result.gitMessage}`;\n        return { content: [{ type: "text", text }], details: result };\n      } catch (error) {\n        const text = errorText(error);\n        return { content: [{ type: "text", text: `Novel Forge event rejected: ${text}` }], details: { error: text } };\n      }\n    },\n'''
          new = '''    async execute(_toolCallId, params, _signal, _onUpdate, ctx) {\n      let root: string | undefined;\n      try {\n        root = requireProjectRoot(params.project_root || ctx.cwd);\n        const files = params.files.map((file) => ({ path: file.path, content: file.content }));\n        const result = applyNovelEvent(root, {\n          eventType: params.event_type as NovelEventType,\n          expectedStage: params.expected_stage as Stage,\n          expectedProjectHash: params.expected_project_hash,\n          files,\n          ...(params.chapter !== undefined ? { chapter: params.chapter } : {}),\n          ...(params.scope ? { scope: params.scope } : {}),\n        });\n        const text = `Applied ${params.event_type}.\\nStage: ${result.stage}\\nChanged: ${result.changed.join(", ")}\\nProject hash: ${result.projectHash}\\nGit: ${result.gitMessage}`;\n        return { content: [{ type: "text", text }], details: result };\n      } catch (error) {\n        let currentStage = String(params.expected_stage || "unknown");\n        let currentProjectHash = String(params.expected_project_hash || "unknown");\n        if (root) {\n          try {\n            currentStage = readProject(root).current_stage;\n            currentProjectHash = projectStateHash(root);\n          } catch {\n            // The normalizer sanitizes project lookup failures.\n          }\n        }\n        const rejection = normalizeEventRejection(error, { root, currentStage, currentProjectHash });\n        const detail = rejection.detail;\n        const text = `Novel Forge event rejected: ${detail.message}\\n${rejectionInstruction(detail)}`;\n        return { content: [{ type: "text", text }], details: { error: detail.message, rejection: detail } };\n      }\n    },\n'''
          if old not in text:
              raise SystemExit('Pi tool execute anchor missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          # Run guidance helper.
          path = Path('src/application/run.ts')
          text = path.read_text(encoding='utf-8')
          anchor = 'import { applyGuidedProjectEvent } from "./handoff.js";\n'
          line = 'import { canRetryEvent, rejectionInstruction, type EventRejectionDetail } from "./event-rejection.js";\n'
          if line not in text:
              text = text.replace(anchor, anchor + line, 1)
          helper = '''\n\nexport function rejectionRunDecision(detail: EventRejectionDetail, previousRetries = 0): RunDecision {\n  const instruction = rejectionInstruction(detail, previousRetries);\n  if (canRetryEvent(detail, previousRetries)) {\n    return { action: "repair-rejection", prompt: null, message: `${detail.message} ${instruction}` };\n  }\n  if (detail.retryable) {\n    return { action: "blocked", prompt: null, message: `Retry limit reached. ${instruction}` };\n  }\n  if (detail.requiresReload) {\n    return { action: "reload-state", prompt: null, message: `${detail.message} ${instruction}` };\n  }\n  return { action: "blocked", prompt: null, message: `${detail.message} ${instruction}` };\n}\n'''
          if helper.strip() not in text:
              text += helper
          path.write_text(text, encoding='utf-8')

          # Shared model prompt policy.
          path = Path('src/application/prompts.ts')
          text = path.read_text(encoding='utf-8')
          old = '''  return `Do not write project files directly. When the content is ready, call the \\`novel_apply_event\\` tool with event_type \\`${eventType}\\`, expected_stage \\`${stage}\\`, expected_project_hash \\`${projectStateHash(root)}\\`, and only the allowed changed files. ${extra} The tool validates schemas, references, state transitions, file allowlists, stale writes, and commits the complete workflow event.`;\n'''
          new = '''  return `Do not write project files directly. When the content is ready, call the \\`novel_apply_event\\` tool with event_type \\`${eventType}\\`, expected_stage \\`${stage}\\`, expected_project_hash \\`${projectStateHash(root)}\\`, and only the allowed changed files. ${extra} The tool validates schemas, references, state transitions, file allowlists, stale writes, and commits the complete workflow event. If the tool returns a structured rejection code, correct only \\`schema-validation\\` or \\`reference-validation\\` payloads and resubmit once. For \\`stale-stage\\` or \\`stale-project-hash\\`, reload canonical state and rebuild the proposal. For all other rejection codes, stop automatic work and surface the failure.`;\n'''
          if old not in text:
              raise SystemExit('eventRule anchor missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          # Remove a brittle test assumption about a .gitkeep file.
          path = Path('tests/e2e/structured-rejection.test.ts')
          text = path.read_text(encoding='utf-8')
          text = text.replace('import { mkdtempSync, readFileSync, rmSync, writeFileSync } from "node:fs";', 'import { mkdtempSync, readFileSync, readdirSync, rmSync, writeFileSync } from "node:fs";', 1)
          old = '''    const project = readProject(root);\n    project.current_stage = "chapter-queue";\n    project.next_gate = null;\n    writeFileSync(projectPath, stringifyYaml(project), "utf8");\n'''
          new = '''    assert.equal(readFileSync(projectPath, "utf8"), projectBefore);\n    assert.equal(readFileSync(bookPath, "utf8"), bookBefore);\n\n    const project = readProject(root);\n    project.current_stage = "chapter-queue";\n    project.next_gate = null;\n    writeFileSync(projectPath, stringifyYaml(project), "utf8");\n'''
          if old not in text:
              raise SystemExit('structured event setup anchor missing')
          text = text.replace(old, new, 1)
          old = '''    const restored = readProject(root);\n    restored.current_stage = "voice-intake";\n    writeFileSync(projectPath, stringifyYaml(restored), "utf8");\n    assert.equal(readFileSync(bookPath, "utf8"), bookBefore);\n    assert.equal(readFileSync(join(root, "books", "book-01", "manuscript", "chapters", ".gitkeep"), "utf8"), "");\n    assert.equal(readFileSync(projectPath, "utf8"), stringifyYaml(restored));\n    assert.notEqual(readFileSync(projectPath, "utf8"), projectBefore, "only the test's explicit stage setup may differ");\n'''
          new = '''    assert.equal(readProject(root).current_stage, "chapter-queue");\n    assert.equal(readFileSync(bookPath, "utf8"), bookBefore);\n    assert.deepEqual(readdirSync(join(root, "books", "book-01", "manuscript", "chapters")), []);\n'''
          if old not in text:
              raise SystemExit('structured event cleanup anchor missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit and remove helper
        run: |
          rm -f .github/workflows/v1-4-2-integration-apply.yml
          touch docs/.v1-4-2-integration-ready
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: integrate structured rejection envelopes"
          git push origin HEAD:agent/v1.4-2-structured-rejections
