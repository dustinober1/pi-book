sample_chapter: |
  The convoy turned east three blocks before the approved junction. Julie felt the change through the floor before the navigation display admitted it. Marcus looked at her, then at the driver, and chose not to reach for his weapon. That told her the test was not whether they noticed. It was whether they panicked. She opened the sealed channel and named the source she had promised never to expose. The brakes came on hard.
