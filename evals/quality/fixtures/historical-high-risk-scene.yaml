context: |-
  HC-TELEGRAPH-ACCESS: customers write messages on office forms; trained clerks operate the key and calculate charges.
  KB-CLARA-1882: Clara understands ordinary railway travel and commercial telegrams but has no technical telegraph training.
  RES-TELEGRAPH-001: the local office closes at 6:00 p.m. and charges by word plus delivery distance.
  RES-TIMETABLE-001: the evening train reaches the junction twenty-eight minutes after office closing.
  RES-CURRENCY-001: Clara can plausibly pay the quoted charge with the coins already established in Chapter 8.
  INV-001: the clerk Mr. Hale is a declared composite character.
protected_constraints:
