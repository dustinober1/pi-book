    - { type: guarded-event, id: E-PACKETS-1, action: chapter-queue, outcome: accepted }
    - { type: context, characters: 9000 }
    - { type: model-prompt, id: P-DRAFT-1 }
    - { type: guarded-event, id: E-DRAFT-1, action: draft-chapter, outcome: accepted, chapter: 1 }
    - { type: model-prompt, id: P-DRAFT-2 }
