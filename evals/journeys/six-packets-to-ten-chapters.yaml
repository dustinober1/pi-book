    - { type: model-prompt, id: P-DRAFT-4 }
    - { type: guarded-event, id: E-DRAFT-4, action: draft-chapter, outcome: accepted, chapter: 4 }
    - { type: model-prompt, id: P-DRAFT-5 }
    - { type: guarded-event, id: E-DRAFT-5, action: draft-chapter, outcome: accepted, chapter: 5 }
    - { type: model-prompt, id: P-DRAFT-6 }
