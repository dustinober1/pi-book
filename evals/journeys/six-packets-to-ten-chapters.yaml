schema_version: 1.0.0
id: six-packets-to-ten-chapters
description: Current bounded packet-window path from six ready packets to ten completed chapters.
limitations:
  - Current drafting requires a second packet-preparation prompt after chapter six.
  - Duplicate accepted chapter events are tolerated by the trace but must not inflate completion counts.
