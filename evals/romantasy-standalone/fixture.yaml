sample_chapter: |
  The ward split beneath Mara's palm and sent blue fire through the street. Kael could have caught her wrist. He stopped a breath short and asked. The courtesy irritated her more than force would have. She gave him permission because the trapped children were screaming behind the stones, not because his voice had gone quiet. Their magic joined badly, all sparks and resistance. When the wall opened, blood ran from his nose instead of hers.
