sample_chapter: |
  The bridge wanted a vow. Mara felt the shape of it press against her teeth, ancient and absolute. Kael offered his hand but not the promise. That distinction was why she still wanted him, and why wanting him remained dangerous. She drew a second circle inside the first and divided the cost between their armies. He understood before she explained. Together they said no to the bond. The bridge opened anyway, and his old scar began to bleed.
