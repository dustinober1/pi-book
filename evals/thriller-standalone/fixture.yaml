sample_chapter: |
  The alarm did not sound. That was the first problem. The second was the pressure gauge climbing in silence while everyone in the control room watched the wrong screen. Mara pulled the maintenance key from the supervisor's hand and crossed the yellow line. Nobody ordered her to stop. They were already deciding who would carry the blame if she failed. Behind the sealed door, the manifold opened another degree.
