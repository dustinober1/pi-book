  evidence: The recovered packet is used before the scene establishes who captured it.
  problem: The reader cannot distinguish risky evidence from convenient evidence.
  requiredChange: Seed the packet's source and one reason it may be incomplete.
  protectedConstraints: [Keep the unauthorized crossing, Do not identify the saboteur]
  acceptanceTests: [The packet has visible provenance, Its evidentiary limit remains active]
